<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Student Performance Prediction</h1>

    <form action="/predict" method="POST">

        <input type="number" step="any" name="study_hours" placeholder="Study Hours" required>

        <input type="number" step="any" name="attendance" placeholder="Attendance %" required>

        <input type="number" step="any" name="sleep_hours" placeholder="Sleep Hours" required>

        <input type="number" step="any" name="previous_score" placeholder="Previous Score" required>

        <input type="number" step="any" name="assignments_completed" placeholder="Assignments Completed" required>

        <button type="submit">Predict</button>

    </form>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
